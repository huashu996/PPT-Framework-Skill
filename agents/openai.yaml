interface:
  display_name: "Paper-Fig-Skill"
  short_description: "Create academic PPT figures with fast SVG skeleton review"
  default_prompt: "Use $paper-fig-skill as the controlling workflow and follow every applicable gate and hard rule strictly; do not let generic presentation tools or automatic connector behavior override it. For text-based tasks, confirm parameters, quickly generate a low-fidelity SVG layout skeleton for approval, then build the PPT. For reference-image tasks, preserve every visible object and verify horizontal/vertical arrows numerically. Insert requested formulas directly as real MathType OLE objects through the desktop PowerPoint plugin."
